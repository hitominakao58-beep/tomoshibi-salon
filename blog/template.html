<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ★① 記事タイトル（検索結果に表示されます。「タイトル｜灯サロン」の形にする） -->
  <title>ここに記事タイトル｜灯サロン</title>

  <!-- ★② 記事の説明文（検索結果に表示される紹介文。100〜120文字。検索されそうな言葉を自然に入れる） -->
  <meta name="description" content="ここに記事の説明文を書きます。この記事が誰のための、何についての文章かが伝わるように。">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --ivory: #F7F4EC;
      --charcoal: #3A3733;
      --charcoal-soft: #6B6660;
      --brass: #B08D57;
      --forest: #2E4636;
      --line: #E3DDD0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Shippori Mincho', serif;
      background: var(--ivory);
      color: var(--charcoal);
      line-height: 2.2;
      letter-spacing: 0.05em;
      font-size: 16px;
    }
    a { color: inherit; text-decoration: none; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header.site-header {
      padding: 48px 0 0;
      text-align: center;
    }
    .site-name {
      font-size: 15px;
      letter-spacing: 0.3em;
      color: var(--charcoal-soft);
    }
    .site-name a:hover { color: var(--brass); }

    .article-header {
      text-align: center;
      padding: 72px 0 56px;
    }
    .article-date {
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--brass);
    }
    h1 {
      margin-top: 20px;
      font-size: 24px;
      font-weight: 500;
      line-height: 2;
      letter-spacing: 0.08em;
    }
    .lamp-mark {
      margin: 40px auto 0;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brass);
    }

    article p {
      margin-bottom: 2em;
    }
    article h2 {
      font-size: 19px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--forest);
      margin: 3.5em 0 1.5em;
      padding-left: 16px;
      border-left: 2px solid var(--brass);
      line-height: 1.9;
    }

    .salon-note {
      margin: 88px 0 0;
      padding: 44px 32px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      text-align: center;
    }
    .salon-note p {
      font-size: 14.5px;
      line-height: 2.2;
      margin-bottom: 1.5em;
    }
    .salon-note p:last-child { margin-bottom: 0; }
    .salon-note a {
      color: var(--forest);
      border-bottom: 1px solid var(--forest);
      padding-bottom: 3px;
    }
    .salon-note a:hover { color: var(--brass); border-color: var(--brass); }

    .back-links {
      text-align: center;
      padding: 64px 0 24px;
      font-size: 14px;
      letter-spacing: 0.1em;
    }
    .back-links a {
      display: inline-block;
      margin: 0 16px;
      color: var(--charcoal-soft);
      border-bottom: 1px solid var(--line);
      padding-bottom: 3px;
    }
    .back-links a:hover { color: var(--brass); border-color: var(--brass); }

    footer {
      text-align: center;
      padding: 48px 0 56px;
      font-size: 12px;
      letter-spacing: 0.15em;
      color: var(--charcoal-soft);
    }

    @media (max-width: 480px) {
      h1 { font-size: 20px; }
      article h2 { font-size: 17px; }
      .salon-note { padding: 36px 20px; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <p class="site-name"><a href="../index.html">灯サロン</a></p>
  </header>

  <div class="article-header container">
    <!-- ★③ 公開年月 -->
    <p class="article-date">2026.00</p>

    <!-- ★④ 記事タイトル（①と同じものを入れる。長い場合は <br> で改行位置を調整できます） -->
    <h1>ここに記事タイトル</h1>
    <div class="lamp-mark"></div>
  </div>

  <main class="container">
    <article>

      <!-- ★⑤ ここから本文。段落は <p>〜</p> で囲む。小見出しは <h2>〜</h2> で囲む -->

      <p>最初の段落。読む人が「これは自分のことだ」と感じられる場面から始めると、届きやすくなります。</p>

      <p>ふたつめの段落。</p>

      <h2>ひとつめの小見出し</h2>

      <p>小見出しには、検索する人が使いそうな言葉（例：1on1、部下、子育て、聴き方）を、不自然にならない範囲で入れると、検索にも届きやすくなります。</p>

      <h2>ふたつめの小見出し</h2>

      <p>本文の続き。</p>

      <!-- ★本文ここまで -->

    </article>

    <!-- ▼サロンへの案内。基本はこのままでOK。記事の内容に合わせて一文目を変えても良い -->
    <div class="salon-note">
      <p>灯サロンでは、人を支える立場にある方が月に一度集まり、<br>こうした問いをめぐって、静かに対話をしています。</p>
      <p><a href="../index.html">灯サロンについて、詳しくはこちら</a></p>
    </div>
  </main>

  <p class="back-links">
    <a href="index.html">読みもの一覧へ</a>
    <a href="../index.html">灯サロンについて</a>
  </p>

  <footer>
    <p>© 灯サロン</p>
  </footer>

</body>
</html>
